<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人 Epsilon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #status {
            position: absolute;
            bottom: 24px;
            left: 24px;
            color: #fff;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.45);
            padding: 10px 16px;
            border-radius: 8px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        body.display-mode #controls,
        body.display-mode #debug-panel {
            display: none;
        }

        body.display-mode #status {
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            background: rgba(0, 0, 0, 0.35);
            padding: 12px 28px;
            border-radius: 20px;
            text-align: center;
            pointer-events: none;
        }

        #controls {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #controls button {
            padding: 10px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            backdrop-filter: blur(12px);
            transition: all 0.25s;
            min-width: 100px;
        }

        #controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        #controls button:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.15);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            font-size: 20px;
            text-align: center;
            transition: opacity 0.5s;
        }

        #loading .spinner {
            width: 36px;
            height: 36px;
            margin: 0 auto 16px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #debug-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 220px;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            overflow-y: auto;
            padding: 20px 16px;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        }

        #debug-panel::-webkit-scrollbar {
            width: 4px;
        }

        #debug-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .debug-section {
            margin-bottom: 20px;
        }

        .debug-title {
            color: #999;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .debug-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .debug-row button {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .debug-row button:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .debug-row button.active {
            background: rgba(100, 180, 255, 0.25);
            border-color: rgba(100, 180, 255, 0.5);
            color: #8cf;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <div id="loading">
        <div class="spinner"></div>
        <div>正在加载数字人...</div>
    </div>

    <div id="status">就绪</div>

    <div id="controls">
        <button onclick="doAction('greet')">打招呼</button>
        <button onclick="doAction('bye')">再见</button>
        <button onclick="doAction('surprise')">惊讶</button>
        <button onclick="doAction('smile')">微笑</button>
    </div>

    <div id="debug-panel">
        <div class="debug-section">
            <div class="debug-title">🎭 表情 Expression</div>
            <div class="debug-row" id="expression-buttons"></div>
        </div>
        <div class="debug-section">
            <div class="debug-title">🎬 动作 Motion</div>
            <div class="debug-row" id="motion-buttons"></div>
        </div>
    </div>

    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
        (function () {
            const { Live2DModel } = PIXI.live2d;
            const canvas = document.getElementById('canvas');
            const statusEl = document.getElementById('status');
            const loadingEl = document.getElementById('loading');

            let app, model = null;
            let ws = null;
            let audio = null;

            function showStatus(text) {
                statusEl.textContent = text;
            }

            function fitModel() {
                if (!model) return;
                const w = app.screen.width;
                const h = app.screen.height;
                model.anchor.set(0.5, 0.5);
                const scale = Math.min(w / 1200, h / 2000) * 0.8;
                model.scale.set(scale);
                model.position.set(w / 2, h * 0.52);
            }

            function resize() {
                const rect = canvas.getBoundingClientRect();
                app.renderer.resize(rect.width, rect.height);
                fitModel();
            }

            async function playMotion(group, index) {
                if (!model) return;
                try {
                    await model.motion(group, index);
                } catch (e) {
                    console.error('Motion error:', group, e);
                }
            }

            function setExpression(name) {
                if (!model) return;
                try {
                    model.expression(name);
                    showStatus('表情: ' + name);
                    document.querySelectorAll('#expression-buttons button').forEach(function (b) {
                        b.classList.toggle('active', b.dataset.name === name);
                    });
                } catch (e) {
                    console.error('Expression error:', name, e);
                }
            }

            function playTTS(name, type) {
                if (audio) {
                    audio.pause();
                    audio = null;
                }
                audio = new Audio('/tts?name=' + encodeURIComponent(name) + '&type=' + type);
                audio.play().catch(function () { });
            }

            function doAction(action) {
                switch (action) {
                    case 'greet':
                        setExpression('Smile');
                        setTimeout(function () { playMotion('Tap', 0); }, 80);
                        playTTS('访客', 'welcome');
                        showStatus('打招呼中...');
                        break;
                    case 'bye':
                        setExpression('Normal');
                        setTimeout(function () { playMotion('Flick', 0); }, 80);
                        playTTS('访客', 'goodbye');
                        showStatus('说再见...');
                        break;
                    case 'surprise':
                        setExpression('Surprised');
                        setTimeout(function () { playMotion('FlickUp', 0); }, 80);
                        showStatus('惊讶中...');
                        break;
                    case 'smile':
                        setExpression('Smile');
                        break;
                }
            }

            function buildDebugPanel() {
                if (!model) return;

                var expressions = [
                    'Angry.exp3.json', 'Blushing.exp3.json',
                    'f01.exp3.json', 'f02.exp3.json',
                    'Normal.exp3.json', 'Sad.exp3.json',
                    'Smile.exp3.json', 'Surprised.exp3.json'
                ];

                var exprLabels = {
                    'Angry.exp3.json': '😡 生气',
                    'Blushing.exp3.json': '😳 害羞',
                    'f01.exp3.json': '😐 表情01',
                    'f02.exp3.json': '😶 表情02',
                    'Normal.exp3.json': '🙂 正常',
                    'Sad.exp3.json': '😢 悲伤',
                    'Smile.exp3.json': '😊 微笑',
                    'Surprised.exp3.json': '😲 惊讶'
                };

                var motions = {
                    '待机 Idle': 'Idle',
                    '轻点 Tap': 'Tap',
                    '轻弹 Flick': 'Flick',
                    '上弹 FlickUp': 'FlickUp',
                    '下弹 FlickDown': 'FlickDown',
                    '三连弹 Flick3': 'Flick3',
                    '摇头 Shake': 'Shake'
                };

                var motionCounts = {
                    'Idle': 1, 'Tap': 4, 'Flick': 2,
                    'FlickUp': 2, 'FlickDown': 2, 'Flick3': 2, 'Shake': 2
                };

                var exprContainer = document.getElementById('expression-buttons');
                var motionContainer = document.getElementById('motion-buttons');

                expressions.forEach(function (name) {
                    var btn = document.createElement('button');
                    btn.textContent = exprLabels[name] || name;
                    btn.dataset.name = name;
                    btn.addEventListener('click', function () {
                        setExpression(name);
                    });
                    exprContainer.appendChild(btn);
                });

                for (var label in motions) {
                    var internalName = motions[label];
                    var count = motionCounts[internalName] || 1;
                    for (var i = 0; i < count; i++) {
                        (function (lbl, name, idx) {
                            var btn = document.createElement('button');
                            btn.textContent = lbl + (count > 1 ? '[' + idx + ']' : '');
                            btn.addEventListener('click', function () {
                                playMotion(name, idx);
                                showStatus('动作: ' + lbl);
                            });
                            motionContainer.appendChild(btn);
                        })(label, internalName, i);
                    }
                }
            }

            function connectWebSocket() {
                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = protocol + '//' + location.host;
                ws = new WebSocket(wsUrl);

                ws.onopen = function () {
                    console.log('WebSocket connected');
                };

                ws.onmessage = function (event) {
                    try {
                        const msg = JSON.parse(event.data);
                        console.log('Event:', msg);
                        handleEvent(msg);
                    } catch (e) {
                        console.error('WS message error:', e);
                    }
                };

                ws.onclose = function () {
                    console.log('WebSocket closed, reconnecting in 3s...');
                    setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = function (err) {
                    console.error('WebSocket error:', err);
                };
            }

            function handleEvent(msg) {
                switch (msg.type) {
                    case 'check_in':
                        setExpression('Smile');
                        setTimeout(function () { playMotion('Tap', Math.floor(Math.random() * 4)); }, 80);
                        playTTS(msg.name || '访客', 'welcome');
                        showStatus(msg.name + ' 签到');
                        break;
                    case 'check_out':
                        setExpression('Normal');
                        setTimeout(function () { playMotion('Flick', 0); }, 80);
                        playTTS(msg.name || '访客', 'goodbye');
                        showStatus(msg.name + ' 签退');
                        break;
                    case 'stranger':
                        setExpression('Surprised');
                        setTimeout(function () { playMotion('FlickUp', 0); }, 80);
                        showStatus('检测到陌生人');
                        break;
                    case 'idle':
                        setExpression('Normal');
                        setTimeout(function () { playMotion('Idle', 0); }, 80);
                        showStatus('待机中');
                        break;
                }
            }

            async function init() {
                try {
                    const rect = canvas.getBoundingClientRect();

                    const isDisplayMode = new URLSearchParams(location.search).has('display');
                    if (isDisplayMode) {
                        document.body.classList.add('display-mode');
                    }

                    app = new PIXI.Application({
                        view: canvas,
                        width: rect.width,
                        height: rect.height,
                        backgroundColor: 0x1a1a2e,
                        antialias: true,
                        resolution: window.devicePixelRatio || 1,
                        autoDensity: true
                    });

                    window.addEventListener('resize', resize);

                    const modelPath = 'models/Epsilon/Epsilon.model3.json';
                    console.log('Loading model:', modelPath);

                    model = await Live2DModel.from(modelPath);
                    console.log('Model loaded successfully');
                    console.log('Model size:', model.width, model.height);
                    console.log('Model children:', app.stage.children.length);

                    app.stage.addChild(model);
                    fitModel();

                    console.log('Model pos:', model.position.x, model.position.y);
                    console.log('Model scale:', model.scale.x, model.scale.y);
                    console.log('Screen:', app.screen.width, app.screen.height);
                    console.log('Canvas rect:', canvas.getBoundingClientRect().width, canvas.getBoundingClientRect().height);

                    setExpression('Normal');
                    playMotion('Idle', 0);
                    showStatus('待机中');

                    buildDebugPanel();

                    loadingEl.style.opacity = '0';
                    setTimeout(function () { loadingEl.style.display = 'none'; }, 500);

                    canvas.addEventListener('click', function (e) {
                        const rect = canvas.getBoundingClientRect();
                        const x = (e.clientX - rect.left) / rect.width;
                        const y = (e.clientY - rect.top) / rect.height;
                        if (y < 0.5) {
                            playMotion('Tap', Math.floor(Math.random() * 4));
                        } else {
                            playMotion('Flick', Math.floor(Math.random() * 2));
                        }
                    });

                    connectWebSocket();

                    console.log('Epsilon avatar ready');
                } catch (err) {
                    console.error('Init failed:', err);
                    loadingEl.innerHTML = '<div>加载失败</div><div style="font-size:14px;margin-top:8px;color:#ff6b6b">' + err.message + '</div>';
                }
            }

            window.doAction = doAction;
            window.setExpression = setExpression;
            window.playMotion = playMotion;

            init();
        })();
    </script>
</body>

</html>
