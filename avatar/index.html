<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人 Epsilon</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="backgrounds.css">
</head>

<body>
    <div id="bubble-container"></div>
    <div id="sakura-container"></div>

    <canvas id="canvas"></canvas>

    <div id="loading">
        <div class="spinner"></div>
        <div>正在加载数字人...</div>
    </div>

    <div id="status">就绪</div>
    <div id="subtitle" aria-live="polite"></div>

    <div id="model-switcher" aria-label="切换数字人模型"></div>

    <div id="controls">
        <button onclick="doAction('wave')">招手</button>
        <button onclick="doAction('greet')">打招呼</button>
        <button onclick="doAction('bye')">再见</button>
        <button onclick="doAction('surprise')">惊讶</button>
        <button onclick="doAction('smile')">微笑</button>
    </div>

    <div id="debug-panel">
        <div class="debug-section">
            <div class="debug-title">表情 Expression</div>
            <div class="debug-row" id="expression-buttons"></div>
        </div>
        <div class="debug-section">
            <div class="debug-title">动作 Motion</div>
            <div class="debug-row" id="motion-buttons"></div>
        </div>
    </div>

    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="node_modules/pixi.js/dist/browser/pixi.min.js"></script>
    <script src="node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>
    <script src="backgrounds.js"></script>
    <script src="avatar.js?v=20260629-mouth-param-ids"></script>
</body>

</html>
