<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动作表情展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0d1117;
            font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        #current-label {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            padding: 14px 36px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            text-align: center;
            white-space: nowrap;
        }

        #progress-bar {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: #58a6ff;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 260px;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: auto;
            overflow-y: auto;
            padding: 20px 16px;
            font-size: 13px;
            color: #ccc;
        }

        #sidebar::-webkit-scrollbar {
            width: 4px;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
        }

        .sec-title {
            color: #888;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sec-list {
            margin-bottom: 20px;
        }

        .sec-item {
            padding: 6px 10px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sec-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .sec-item.current {
            background: rgba(88, 166, 255, 0.2);
            color: #58a6ff;
            font-weight: 600;
        }

        .sec-item.played {
            color: #3fb950;
        }

        .sec-item .icon {
            width: 16px;
            text-align: center;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        #controls button {
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        #controls button:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        #status-top {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>
    <div id="loading">加载中...</div>

    <div id="hud" style="display:none">
        <div id="status-top"></div>
        <div id="current-label"></div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="controls">
            <button id="btn-prev">◀ 上一个</button>
            <button id="btn-toggle">⏸ 暂停</button>
            <button id="btn-next">下一个 ▶</button>
        </div>
        <div id="sidebar">
            <div class="sec-title">🎭 表情</div>
            <div class="sec-list" id="expr-list"></div>
            <div class="sec-title">🎬 动作</div>
            <div class="sec-list" id="motion-list"></div>
        </div>
    </div>

    <script src="lib/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
        const canvas = document.getElementById('canvas');
        const loadingEl = document.getElementById('loading');
        const hudEl = document.getElementById('hud');
        const currentLabel = document.getElementById('current-label');
        const progressFill = document.getElementById('progress-fill');
        const statusTop = document.getElementById('status-top');
        const btnToggle = document.getElementById('btn-toggle');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const exprListEl = document.getElementById('expr-list');
        const motionListEl = document.getElementById('motion-list');

        let app, model;
        let isPaused = false;
        let currentIndex = 0;
        let progressTimer = null;
        const ITEM_DURATION = 2500;
        const CROSSFADE = 300;

        const EXPRESSIONS = [
            { file: 'Normal.exp3.json', label: '正常' },
            { file: 'Smile.exp3.json', label: '微笑' },
            { file: 'Angry.exp3.json', label: '生气' },
            { file: 'Sad.exp3.json', label: '悲伤' },
            { file: 'Surprised.exp3.json', label: '惊讶' },
            { file: 'Blushing.exp3.json', label: '害羞' },
            { file: 'f01.exp3.json', label: '表情01' },
            { file: 'f02.exp3.json', label: '表情02' },
        ];

        const MOTIONS = [
            { group: 'Idle', index: 0, label: '待机', file: 'idle_01' },
            { group: 'Tap', index: 0, label: '轻点[0]', file: 'm_03' },
            { group: 'Tap', index: 1, label: '轻点[1]', file: 'm_sp_02' },
            { group: 'Tap', index: 2, label: '轻点[2]', file: 'm_sp_03' },
            { group: 'Tap', index: 3, label: '轻点[3]', file: 'm_sp_05' },
            { group: 'Flick3', index: 0, label: '三连弹[0]', file: 'm_sp_01' },
            { group: 'Flick3', index: 1, label: '三连弹[1]', file: 'm_04' },
            { group: 'FlickUp', index: 0, label: '上弹[0]', file: 'm_01' },
            { group: 'FlickUp', index: 1, label: '上弹[1]', file: 'm_05' },
            { group: 'FlickDown', index: 0, label: '下弹[0]', file: 'm_06' },
            { group: 'FlickDown', index: 1, label: '下弹[1]', file: 'm_08' },
            { group: 'Flick', index: 0, label: '轻弹[0]', file: 'm_02' },
            { group: 'Flick', index: 1, label: '轻弹[1]', file: 'm_07' },
            { group: 'Shake', index: 0, label: '摇头[0]', file: 'shake_01' },
            { group: 'Shake', index: 1, label: '摇头[1]', file: 'm_sp_04' },
        ];

        const ALL_ITEMS = [
            ...EXPRESSIONS.map(e => ({ type: 'expression', ...e })),
            ...MOTIONS.map(m => ({ type: 'motion', ...m })),
        ];

        function buildSidebar() {
            exprListEl.innerHTML = '';
            EXPRESSIONS.forEach((e, i) => {
                const div = document.createElement('div');
                div.className = 'sec-item';
                div.innerHTML = '<span class="icon"></span>' + e.label;
                div.onclick = () => jumpTo(i);
                exprListEl.appendChild(div);
                e._el = div;
            });
            motionListEl.innerHTML = '';
            MOTIONS.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'sec-item';
                div.innerHTML = '<span class="icon"></span>' + m.label;
                div.onclick = () => jumpTo(EXPRESSIONS.length + i);
                motionListEl.appendChild(div);
                m._el = div;
            });
        }

        function showItem(index) {
            const item = ALL_ITEMS[index];
            if (!item) return;

            const emoji = item.type === 'expression' ? '🎭' : '🎬';
            currentLabel.textContent = emoji + ' ' + item.label;

            try {
                if (item.type === 'expression') {
                    model.expression(item.file);
                } else {
                    model.motion(item.group, item.index);
                }
            } catch (e) {
                console.error('Play error:', e);
            }

            updateSidebarHighlight(index);
            statusTop.textContent = (index + 1) + ' / ' + ALL_ITEMS.length;
        }

        function updateSidebarHighlight(index) {
            const item = ALL_ITEMS[index];
            document.querySelectorAll('.sec-item').forEach(el => el.classList.remove('current'));
            document.querySelectorAll('.sec-item').forEach((el, i) => {
                if (i < index) el.classList.add('played');
            });
            if (item.type === 'expression') {
                const exprIdx = index;
                EXPRESSIONS[exprIdx]._el.classList.add('current');
            } else {
                const motionIdx = index - EXPRESSIONS.length;
                MOTIONS[motionIdx]._el.classList.add('current');
            }
        }

        function jumpTo(index) {
            currentIndex = index;
            showItem(currentIndex);
            if (!isPaused) startProgress();
        }

        function nextItem() {
            currentIndex = (currentIndex + 1) % ALL_ITEMS.length;
            showItem(currentIndex);
            if (!isPaused) startProgress();
        }

        function prevItem() {
            currentIndex = (currentIndex - 1 + ALL_ITEMS.length) % ALL_ITEMS.length;
            showItem(currentIndex);
            if (!isPaused) startProgress();
        }

        function startProgress() {
            clearInterval(progressTimer);
            progressFill.style.transition = 'none';
            progressFill.style.width = '0%';
            requestAnimationFrame(() => {
                progressFill.style.transition = 'width ' + (ITEM_DURATION / 1000) + 's linear';
                progressFill.style.width = '100%';
            });
            progressTimer = setTimeout(() => {
                nextItem();
            }, ITEM_DURATION);
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(progressTimer);
                clearTimeout(progressTimer);
                progressFill.style.transition = 'none';
                btnToggle.textContent = '▶ 播放';
            } else {
                btnToggle.textContent = '⏸ 暂停';
                startProgress();
            }
        }

        btnToggle.addEventListener('click', togglePause);
        btnNext.addEventListener('click', () => { nextItem(); });
        btnPrev.addEventListener('click', () => { prevItem(); });

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ': e.preventDefault(); togglePause(); break;
                case 'ArrowRight': nextItem(); break;
                case 'ArrowLeft': prevItem(); break;
            }
        });

        function resize() {
            if (!app) return;
            const rect = canvas.getBoundingClientRect();
            app.renderer.resize(rect.width, rect.height);
            if (model) {
                model.anchor.set(0.5, 0.5);
                const scale = Math.min(rect.width / 1200, rect.height / 2000) * 0.8;
                model.scale.set(scale);
                model.position.set(rect.width / 2, rect.height * 0.52);
            }
        }

        async function init() {
            const { Live2DModel } = PIXI.live2d;
            const rect = canvas.getBoundingClientRect();
            app = new PIXI.Application({
                view: canvas, width: rect.width, height: rect.height,
                backgroundColor: 0x0d1117, antialias: true,
                resolution: window.devicePixelRatio || 1, autoDensity: true
            });

            window.addEventListener('resize', resize);

            model = await Live2DModel.from('models/Epsilon/Epsilon.model3.json');
            app.stage.addChild(model);
            resize();
            model.expression('Normal.exp3.json');

            buildSidebar();

            loadingEl.style.display = 'none';
            hudEl.style.display = 'block';

            showItem(0);
            startProgress();
        }

        init().catch(err => {
            loadingEl.textContent = '加载失败: ' + err.message;
            console.error(err);
        });
    </script>
</body>

</html>
